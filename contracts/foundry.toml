[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
optimizer = true
optimizer_runs = 200
solc_version = "0.8.24"

[rpc_endpoints]
pharos = "${PHAROS_RPC_URL}"

[etherscan]
pharos = { key = "no-key-needed", url = "${PHAROS_EXPLORER}/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
